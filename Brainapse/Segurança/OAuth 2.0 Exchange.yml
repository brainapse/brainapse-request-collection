info:
  name: OAuth 2.0 Exchange
  type: http
  seq: 8

http:
  method: POST
  url: http://{{url}}/auth/oauth_token
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "code": "authorization_code_from_provider",
          "provider": "google",
          "state": "random_state_string"
        }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
