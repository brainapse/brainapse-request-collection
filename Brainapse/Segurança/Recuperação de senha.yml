info:
  name: Recuperação de senha
  type: http
  seq: 2

http:
  method: POST
  url: http://{{url}}/auth/password_recovery
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "email": "user@example.com"
        }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
