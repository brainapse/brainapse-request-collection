info:
  name: Trocar senha
  type: http
  seq: 5

http:
  method: POST
  url: http://{{url}}/auth/change_password
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{access_token}}
  body:
    type: json
    data: |-
      {
          "currentPassword": "oldPassword123",
          "newPassword": "newPassword123"
        }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
