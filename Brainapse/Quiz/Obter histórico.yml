info:
  name: Obter histórico
  type: http
  seq: 2

http:
  method: GET
  url: "{{url}}/quiz/history?page=1&size=4"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  params:
    - name: page
      value: "1"
      type: query
    - name: size
      value: "4"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
