info:
  name: Construir Quiz
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/quiz/build?difficulty=easy&amountBySubject=10&subject=ingles&subject=matematica&subject=portugues"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  params:
    - name: difficulty
      value: easy
      type: query
    - name: amountBySubject
      value: "10"
      type: query
    - name: subject
      value: ingles
      type: query
    - name: subject
      value: matematica
      type: query
    - name: subject
      value: portugues
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
