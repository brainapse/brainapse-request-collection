info:
  name: Buscar o ranking
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/ranking/getall"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
